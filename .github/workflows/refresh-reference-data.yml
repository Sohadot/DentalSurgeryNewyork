name: Refresh Reference Data

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'

permissions:
  contents: write

concurrency:
  group: reference-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.9'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild reference manifests
        run: |
          npm run refresh:reference-data
          npm run validate

      - name: Commit manifest updates if changed
        run: |
          if git diff --quiet; then
            echo "No manifest changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/system/routes.json data/system/sitemap-manifest.json
          git commit -m "chore: refresh reference manifests"
          git push
